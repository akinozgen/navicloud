name: Release

# vX.Y.Z tag'i push'landığında Android APK + Windows kurulumu + Linux rpm/deb derlenir,
# GitHub Release açılıp artifact'lar yüklenir.
# Not: Linux paketleri sistem libmpv'sine bağımlıdır (Fedora: mpv-libs, Debian/Ubuntu: libmpv2).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: SDK paketleri
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null
      - name: APK derle (release)
        run: java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain :app:assembleRelease --no-daemon --stacktrace
      - name: Adlandır
        run: cp app/build/outputs/apk/release/app-release.apk "NaviCloud-${{ github.ref_name }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: NaviCloud-*.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: libmpv indir (gömülü ses motoru)
        shell: pwsh
        run: |
          $h = @{ Authorization = "Bearer ${{ github.token }}"; "User-Agent" = "navicloud-ci" }
          $rel = Invoke-RestMethod "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers $h
          $asset = $rel.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-\d.*\.7z$' } | Select-Object -First 1
          if (-not $asset) { throw "libmpv-dev asset bulunamadi" }
          Invoke-WebRequest $asset.browser_download_url -OutFile mpv-dev.7z
          7z x mpv-dev.7z -ompv-dev | Out-Null
          New-Item -ItemType Directory -Force desktop/packaging/windows-x64 | Out-Null
          $dll = (Get-ChildItem -Recurse mpv-dev -Filter libmpv-2.dll | Select-Object -First 1).FullName
          Copy-Item $dll desktop/packaging/windows-x64/libmpv-2.dll
      - name: SMTC yardımcısı derle (Rust)
        shell: pwsh
        run: |
          cargo build --release --manifest-path desktop/smtc-helper/Cargo.toml
          Copy-Item desktop/smtc-helper/target/release/navicloud-smtc.exe desktop/packaging/windows-x64/navicloud-smtc.exe
      - name: Dağıtım derle (jpackage)
        shell: pwsh
        run: java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain :desktop:createDistributable --no-daemon --stacktrace
      - name: NSIS kur
        shell: pwsh
        run: choco install nsis -y --no-progress
      - name: Kurulum derle (NSIS)
        shell: pwsh
        run: |
          $appdir = "$env:GITHUB_WORKSPACE\desktop\build\compose\binaries\main\app\NaviCloud"
          Push-Location desktop/installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" "-DAPPDIR=$appdir" navicloud.nsi
          Pop-Location
          Copy-Item desktop/installer/NaviCloud-Setup.exe "NaviCloud-${{ github.ref_name }}-Setup.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: NaviCloud-*-Setup.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: rpm araçları kur (dpkg/fakeroot runner'da hazır)
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: RPM + DEB derle (app-image + kendi spec/control'ümüz)
        # jpackage'ın packageRpm/Deb'i değil: menü girdisi + libmpv bağımlılığı
        # paket içeriği olarak girsin diye scripts/build-release-linux.sh kullanılır
        run: NAVICLOUD_JDK="$JAVA_HOME" scripts/build-release-linux.sh all
      - name: Adlandır
        run: |
          cp dist/navicloud-*.rpm "NaviCloud-${{ github.ref_name }}.x86_64.rpm"
          cp dist/navicloud_*.deb "NaviCloud-${{ github.ref_name }}.amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            NaviCloud-*.rpm
            NaviCloud-*.deb

  release:
    needs: [android, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
